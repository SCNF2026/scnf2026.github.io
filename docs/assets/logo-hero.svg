    <g font-family="'Inter', -apple-system, sans-serif" font-size="130" font-weight="900" text-anchor="middle" fill="#031018">
      <text x="220" y="165">S</text>
      <text x="330" y="165">C</text>
      <text x="550" y="165">F</text>
    </g>
    <text x="615" y="115" font-family="'JetBrains Mono', monospace" font-size="40" font-weight="800" letter-spacing="1" fill="#031018" text-anchor="start">2026</text>
  </g>

