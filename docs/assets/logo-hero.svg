  </g>

  <g transform="translate(0 7.6)" opacity="0.18" filter="url(#blurTextCyan)">
    <g font-family="'Inter', -apple-system, sans-serif" font-size="130" font-weight="900" text-anchor="middle" fill="#12D7F3">
