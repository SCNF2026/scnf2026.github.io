site_name: "SCNF 2026"
site_description: "Structure and Closure in Nonequilibrium Flows (SCNF) 2026"
site_url: "https://scnf2026.github.io/"

extra:
  generator: false
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:scnf2026@gmail.com

copyright: >-
  Supported by <a href="https://www.jst.go.jp/presto/en/" target="_blank" rel="noopener">JST PRESTO</a>
  "Complex Flow" project &nbsp;|&nbsp; &copy; 2026 SCNF 2026 Organizing Committee

theme:
  name: material
  language: en
  logo: assets/logo-hero.svg
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - search.suggest
    - search.highlight

plugins:
  - search
  - meta

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Program: program.md
  - Organizers: organizers.md
  - Participants: participants.md
  - Venue & Contact: venue.md

extra:
  analytics:
    provider: google
    property: G-P7TR24EMWB